<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Order Now - Lotus Foto</title>
    <meta name="description" content="Place your real estate photo editing order with Lotus Foto. Fast turnaround, 14-step process, consistent quality.">
    <meta property="og:title" content="Order Now - Lotus Foto">
    <meta property="og:description" content="Submit your real estate photos for professional editing. 12–15 hour turnaround.">
    <meta property="og:image" content="images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="images/logo/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary:   #070b17;
            --bg-card:      #111728;
            --border-color: #1e293b;
            --border-gold:  rgba(212,168,83,0.18);
            --gold-primary: #d4a853;
            --gold-hover:   #e8c57a;
            --text-primary: #f0f4ff;
            --text-secondary: #94a3b8;
            --text-muted:   #64748b;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0d1428 60%, var(--bg-primary) 100%);
            min-height: 100vh;
            padding: 48px 20px;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Back button ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gold-primary);
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(212,168,83,0.28);
            border-radius: 8px;
            transition: background 0.25s, border-color 0.25s;
            margin: 0 0 28px 0;
            display: inline-flex;
        }
        .back-btn:hover {
            background: rgba(212,168,83,0.08);
            border-color: rgba(212,168,83,0.5);
        }

        /* ── Order container ── */
        .order-container {
            max-width: 860px;
            margin: 0 auto;
        }

        /* ── Card ── */
        .order-card {
            background: linear-gradient(145deg, rgba(17,23,40,0.92), rgba(22,30,55,0.80));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-gold);
            border-top: 3px solid var(--gold-primary);
            border-radius: 20px;
            padding: 52px 52px 48px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.55);
        }

        /* ── Title ── */
        .form-header {
            text-align: center;
            margin-bottom: 44px;
        }
        .form-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(212,168,83,0.1);
            border: 1px solid rgba(212,168,83,0.28);
            color: var(--gold-primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        .form-header h1 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .form-header p {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* ── Form ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .form-group { margin-bottom: 22px; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gold-primary);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 9px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(7,11,23,0.8);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.22s, box-shadow 0.22s;
            box-sizing: border-box;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--text-muted); }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 3px rgba(212,168,83,0.14);
        }
        .form-group textarea { resize: vertical; min-height: 140px; }

        /* ── Checkboxes ── */
        .services-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gold-primary);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: block;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 22px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 14px 18px;
            background: rgba(7,11,23,0.7);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: border-color 0.22s, background 0.22s, color 0.22s;
        }
        .checkbox-label:hover {
            border-color: rgba(212,168,83,0.4);
            background: rgba(212,168,83,0.06);
            color: var(--text-primary);
        }
        .checkbox-label input[type="checkbox"] {
            width: 16px; height: 16px;
            cursor: pointer;
            accent-color: var(--gold-primary);
            flex-shrink: 0;
        }

        /* ── Submit ── */
        .submit-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-hover));
            color: #070b17;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            box-shadow: 0 6px 24px rgba(212,168,83,0.3);
            transition: transform 0.3s, box-shadow 0.3s, opacity 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(212,168,83,0.45);
        }
        .submit-btn:active { transform: translateY(0); }

        /* ── Divider ── */
        .form-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin: 24px 0;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            body { padding: 24px 12px; }
            .order-card { padding: 32px 20px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .checkbox-group { grid-template-columns: 1fr; }
            .form-header h1 { font-size: 1.7rem; }
        }
    </style>
</head>

<body>
    <div class="order-container">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="order-card">
            <div class="form-header">
                <div class="form-eyebrow"><i class="fas fa-camera"></i> Lotus Foto</div>
                <h1>Place Your Order</h1>
                <p>Get professional photo editing services with our easy-to-use order form</p>
            </div>

            <form id="orderForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Your name *</label>
                        <input type="text" id="name" name="name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="email">Your email *</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="orderName">Order name</label>
                        <input type="text" id="orderName" name="orderName" placeholder="Give your order a name (optional)">
                    </div>
                    <div class="form-group">
                        <label for="fileCount">Number of files</label>
                        <input type="number" id="fileCount" name="fileCount" min="1" placeholder="How many photos?">
                    </div>
                </div>

                <hr class="form-divider">

                <label class="services-label">Services *</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Photo Editing">
                        <span>Photo Editing</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Day to Dusk">
                        <span>Day to Dusk</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Item Removal">
                        <span>Item Removal</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Virtual Staging & Renovation">
                        <span>Virtual Staging & Renovation</span>
                    </label>
                </div>

                <hr class="form-divider">

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Please provide your photo links and any specific requirements..."></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> Submit Order
                </button>
            </form>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function () {
            emailjs.init('oePYhOLnFauHGVWxo');
        })();

        document.addEventListener('DOMContentLoaded', function () {
            const orderForm = document.getElementById('orderForm');
            if (orderForm) {
                orderForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    const formData = new FormData(orderForm);
                    const data = {
                        from_name:  formData.get('name'),
                        from_email: formData.get('email'),
                        order_name: formData.get('orderName'),
                        file_count: formData.get('fileCount'),
                        services:   formData.getAll('services').join(', '),
                        message:    formData.get('message')
                    };
                    emailjs.send('service_kmrw0ry', 'template_82o99g6', data)
                        .then(function () {
                            alert('Order submitted successfully! We will contact you within 24 hours.');
                            orderForm.reset();
                        }, function () {
                            alert('There was an error sending your order. Please try again or contact us directly.');
                        });
                });
            }
        });
    </script>
</body>

</html>
